<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  * { box-sizing:border-box; margin:0; padding:0 }
  html, body { width:100%; height:100%; overflow:hidden; background:#000 }
  .card { position:fixed; inset:0; overflow:hidden }
  .card-video { position:absolute; inset:0; width:100%; height:100%; object-fit:cover }
  /* vector layout (logotype, name, role) exported from og_card.svg, images stripped */
  .card-layout { position:absolute; inset:0; width:100%; height:100%; object-fit:contain; display:block }
</style>
</head>
<body>
  <div class="card">
    <video class="card-video" autoplay loop muted playsinline>
      <source src="images/foa/card-motion.mp4" type="video/mp4">
    </video>
    <img class="card-layout" src="images/foa/og_card_layout.svg" alt="Field of Action — Alfred (Daniel) Dickson II" />
  </div>
</body>
</html>
