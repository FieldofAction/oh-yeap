<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0C0D10; --fg:#E8EAF0; --fm:#868B94; --ff:#565A62; --bd:#1C1E24; --ac:#2F5BFF; }
  * { box-sizing:border-box; margin:0; padding:0 }
  html, body { width:1200px; height:630px; background:var(--bg); color:var(--fg); font-family:'Inter',system-ui,sans-serif; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; overflow:hidden }
  .card { position:relative; width:1200px; height:630px; display:flex; flex-direction:row }
  .card-body { position:relative; flex:1; min-width:0; padding:64px 56px 56px 72px; display:flex; flex-direction:column; justify-content:space-between }
  .card-image { flex:none; width:430px; height:630px; border-left:1px solid var(--bd); background:#E8EAF0 url('images/foa/card-structure.png') center/cover no-repeat }
  /* corner ticks — a nod to the grid aesthetic on the home hero */
  .tick { position:absolute; width:14px; height:14px; border-color:var(--ff); border-style:solid; border-width:0 }
  .tick.tl { top:40px; left:40px; border-top-width:1px; border-left-width:1px }
  .tick.tr { top:40px; right:40px; border-top-width:1px; border-right-width:1px }
  .tick.bl { bottom:40px; left:40px; border-bottom-width:1px; border-left-width:1px }
  .tick.br { bottom:40px; right:40px; border-bottom-width:1px; border-right-width:1px }
  .top { display:flex; align-items:baseline; justify-content:space-between }
  .brand { font-size:15px; font-weight:500; letter-spacing:.08em; text-transform:uppercase; color:var(--fm) }
  .meta { font-family:'Space Mono',monospace; font-size:13px; color:var(--ff); letter-spacing:.04em }
  .center { display:flex; flex-direction:column; gap:30px; align-items:flex-start; margin-top:-8px }
  .mark { display:block; height:52px; width:auto; fill:var(--fg) }
  .rule { width:72px; height:1px; background:var(--ac); opacity:.9 }
  .name { font-size:22px; font-weight:500; letter-spacing:.01em; color:var(--fg) }
  .name span { color:var(--fm); font-weight:400 }
  .bottom { display:flex; align-items:flex-end; justify-content:space-between }
  .role { font-size:15px; font-weight:400; line-height:1.5; color:var(--fm); max-width:520px }
  .role b { color:var(--fg); font-weight:500 }
  .url { font-family:'Space Mono',monospace; font-size:14px; color:var(--fg); letter-spacing:.02em }
</style>
</head>
